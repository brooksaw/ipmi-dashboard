name: Build ipmitool.exe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            make
            gcc
            gettext
            gettext-devel
            libiconv-devel

      - name: Clone ipmitool
        shell: msys2 {0}
        run: git clone --depth 1 --branch IPMITOOL_1_8_19 https://github.com/ipmitool/ipmitool.git

      - name: Patch for MSYS2 compatibility
        shell: msys2 {0}
        working-directory: ipmitool
        run: |
          # Fix strptime: add #define _GNU_SOURCE before any includes
          sed -i '1i #define _GNU_SOURCE' lib/ipmi_sel.c
          sed -i '1i #define _GNU_SOURCE' src/ipmitool.c
          sed -i '1i #define _GNU_SOURCE' lib/ipmi_sdr.c
          sed -i '1i #define _GNU_SOURCE' lib/ipmi_time.c

      - name: Build ipmitool (statically linked)
        shell: msys2 {0}
        working-directory: ipmitool
        run: |
          ./bootstrap
          ./configure             --enable-static             --disable-shared             --disable-ipmishell             CFLAGS="-O2 -Wno-error -Wno-format-truncation"             LDFLAGS="-static -static-libgcc"             LIBS="-lintl -liconv"
          make -j$(nproc)
          
          # Verify it is statically linked (no DLL dependencies)
          echo "=== Checking dependencies ==="
          objdump -p src/ipmitool.exe | grep "DLL Name" || echo "No DLL dependencies found (good!)"
          
          strip src/ipmitool.exe
          ls -lh src/ipmitool.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipmitool-windows
          path: ipmitool/src/ipmitool.exe

      - name: Create/Update release with binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          gh release create latest ipmitool/src/ipmitool.exe             --repo "$REPO"             --title "ipmitool.exe (latest build)"             --notes "Windows ipmitool.exe — statically linked, no dependencies. Built from ipmitool/ipmitool IPMITOOL_1_8_19"             || gh release upload latest ipmitool/src/ipmitool.exe --repo "$REPO" --clobber
