name: Build ipmitool.exe

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-ipmitool.yml'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            git
            autoconf
            automake
            make
            gcc
            gettext-devel
            libtool
            pkg-config

      - name: Checkout ipmitool source
        run: git clone --depth 1 --branch IPMITOOL_1_8_19 https://github.com/ipmitool/ipmitool.git

      - name: Build ipmitool
        working-directory: ipmitool
        run: |
          export CFLAGS="-O2 -Wno-error -Wno-format-truncation"
          export LDFLAGS="-static-libgcc -static-libstdc++"
          ./bootstrap || true
          ./configure --enable-static --disable-shared --disable-intf-free --disable-intf-usb
          make -j$(nproc) || true

      - name: Package with MSYS2 runtime
        working-directory: ipmitool
        run: |
          if [ -f src/ipmitool.exe ]; then
            strip src/ipmitool.exe
            ls -lh src/ipmitool.exe
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
          fi

      - name: Package distribution
        if: env.BUILD_SUCCESS == 'true'
        working-directory: ipmitool
        run: |
          mkdir -p dist
          cp src/ipmitool.exe dist/
          # Bundle the MSYS2 runtime DLL that ipmitool needs
          cp /ucrt64/bin/msys-2.0.dll dist/ || cp /usr/bin/msys-2.0.dll dist/ || true
          ls -lh dist/

      - name: Upload to release
        if: env.BUILD_SUCCESS == 'true'
        working-directory: ipmitool
        shell: bash
        run: |
          gh release delete latest --yes || true
          sleep 2
          gh release create latest dist/ipmitool.exe dist/msys-2.0.dll             --title "Latest Build"             --notes "Auto-built ipmitool.exe with MSYS2 runtime"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
