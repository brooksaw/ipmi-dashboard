name: Build ipmitool.exe

on:
  workflow_dispatch:  # Manual trigger
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ipmitool source
        uses: actions/checkout@v4
        with:
          repository: ipmitool/ipmitool
          ref: IPMITOOL_1_8_19

      - name: Install cross-compile deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 autoconf automake libtool

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure for Windows
        run: |
          ./configure             --host=x86_64-w64-mingw32             --enable-static             --disable-shared             --disable-intf-open             --disable-intf-free             --disable-intf-imb             --disable-ipmishell             CFLAGS="-O2 -static"

      - name: Build
        run: make -j$(nproc)

      - name: Strip binary
        run: x86_64-w64-mingw32-strip src/ipmitool.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipmitool-windows
          path: src/ipmitool.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: src/ipmitool.exe
