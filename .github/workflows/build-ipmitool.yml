name: Build ipmitool.exe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            make
            gcc
            gettext-devel
            libiconv-devel

      - name: Clone and build ipmitool
        shell: msys2 {0}
        run: |
          git clone --depth 1 --branch IPMITOOL_1_8_19 https://github.com/ipmitool/ipmitool.git
          cd ipmitool
          ./bootstrap
          ./configure --enable-static --disable-shared --disable-ipmishell
          make -j$(nproc)
          strip src/ipmitool.exe
          ls -lh src/ipmitool.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipmitool-windows
          path: ipmitool/src/ipmitool.exe

      - name: Create/Update release with binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # Create a release if it doesn't exist
          gh release create latest ipmitool/src/ipmitool.exe             --repo "$REPO"             --title "ipmitool.exe (latest build)"             --notes "Cross-compiled ipmitool.exe for Windows (built from ipmitool/ipmitool IPMITOOL_1_8_19)"             || gh release upload latest ipmitool/src/ipmitool.exe --repo "$REPO" --clobber
