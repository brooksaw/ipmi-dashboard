name: Build ipmitool.exe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            make
            gcc
            gettext-devel
            libiconv-devel

      - name: Clone ipmitool
        shell: msys2 {0}
        run: git clone --depth 1 --branch IPMITOOL_1_8_19 https://github.com/ipmitool/ipmitool.git

      - name: Patch for MSYS2 compatibility
        shell: msys2 {0}
        working-directory: ipmitool
        run: |
          # Add strptime shim for Windows
          cat >> lib/ipmi_sel.c << 'SHIM'

          /* strptime shim for Windows/MSYS2 */
          #ifndef HAVE_STRPTIME
          char * strptime(const char *buf, const char *fmt, struct tm *tm) {
              /* Minimal implementation - just return NULL to skip time parsing */
              return NULL;
          }
          #endif
          SHIM

      - name: Build ipmitool
        shell: msys2 {0}
        working-directory: ipmitool
        run: |
          ./bootstrap
          ./configure             --enable-static             --disable-shared             --disable-ipmishell             CFLAGS="-O2 -Wno-error -Wno-implicit-function-declaration -Wno-format-truncation"
          make -j$(nproc)
          strip src/ipmitool.exe
          ls -lh src/ipmitool.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipmitool-windows
          path: ipmitool/src/ipmitool.exe

      - name: Create/Update release with binary
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          gh release create latest ipmitool/src/ipmitool.exe             --repo "$REPO"             --title "ipmitool.exe (latest build)"             --notes "Windows ipmitool.exe built from ipmitool/ipmitool IPMITOOL_1_8_19"             || gh release upload latest ipmitool/src/ipmitool.exe --repo "$REPO" --clobber
