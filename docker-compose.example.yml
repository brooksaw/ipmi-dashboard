services:
  ipmi-dashboard:
    build: .
    container_name: ipmi-dashboard
    network_mode: host
    restart: unless-stopped
    environment:
      - IPMI_HOST=${IPMI_HOST}
      - IPMI_USER=${IPMI_USER:-ADMIN}
      - IPMI_PASS=${IPMI_PASS}
      - WEB_PORT=${WEB_PORT:-8080}
      - WEB_REFRESH=${WEB_REFRESH:-10}
